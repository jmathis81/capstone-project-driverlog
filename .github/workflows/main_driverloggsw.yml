name: Build and deploy Node.js app to Azure Web App - DriverLogGSW

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: npm install, build
        working-directory: frontend_website
        env:
          VITE_REDIRECT_URI: https://driverloggsw.azurewebsites.net
          VITE_AZURE_MAPS_KEY: ${{ secrets.AZURE_MAPS_KEY }}
        run: |
          npm install
          npm run build

      - name: Prepare deployment package
        run: |
          mkdir deploy
          cp -r frontend_website/dist deploy/dist
          cp frontend_website/package.json deploy/package.json
          cp frontend_website/package-lock.json deploy/package-lock.json
          cp frontend_website/server.js deploy/server.js

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C201D8A68EE14FA7A14593EBBFB29A42 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_411A7046E1524345BBC14DB88E400E59 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FF6C0609A2D543F78C50DE34F0CDB8C3 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'DriverLogGSW'
          slot-name: 'Production'
          package: .
